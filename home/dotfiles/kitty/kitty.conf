# kitty.conf - Terminal-focused configuration
# Reload config: ctrl+shift+f5

# === Font ===
font_family      JetBrains Mono
font_size        14.0
# Uncomment if you prefer a different font:
# font_family    Berkeley Mono
# font_family    Iosevka

# === Scrollback ===
scrollback_lines 50000
# MB of scrollback available to pager
scrollback_pager_history_size 100

# === kitty-scrollback.nvim ===
# Full neovim scrollback integration (installed via lazy.nvim)
action_alias kitty_scrollback_nvim kitten ~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Browse scrollback in nvim (replaces basic pager)
map ctrl+shift+h kitty_scrollback_nvim

# Browse last command output in nvim
map ctrl+shift+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output

# Ctrl+Shift+Right-click on command output to open in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

# === Shell Integration ===
shell_integration enabled
# This enables: command output marking, pwd tracking, prompt detection
# Use ctrl+shift+z to scroll to previous prompt
# Use ctrl+shift+x to scroll to next prompt
# Use ctrl+shift+g to show last command output

# === Hints Mode (URL/path/word selection) ===
# Press ctrl+shift+e to enter hints mode for URLs
# These define additional hint patterns:
map ctrl+shift+p>f kitten hints --type path --program -
map ctrl+shift+p>l kitten hints --type line --program -
map ctrl+shift+p>w kitten hints --type word --program -
map ctrl+shift+p>h kitten hints --type hash --program -
map ctrl+shift+p>i kitten hints --type ip --program -

# Open URLs with hints
map ctrl+shift+e open_url_with_hints

# === Built-in Kittens ===
# Hyperlinked grep - search with clickable results that open in editor
map ctrl+shift+/ launch --type=overlay --cwd=current kitty +kitten hyperlinked_grep

# Diff - side-by-side diff viewer
# Usage: select two files with ctrl+shift+p>f, then use this
# Or run: kitty +kitten diff file1 file2

# Unicode input (already default ctrl+shift+u)
# map ctrl+shift+u kitten unicode_input

# Themes - preview and switch themes
map ctrl+shift+p>t kitten themes

# Fonts - preview and switch fonts
map ctrl+shift+p>o kitten choose-fonts

# Clipboard - copy/paste from scripts (useful in pipes)
# Usage: echo "text" | kitty +kitten clipboard
# Usage: kitty +kitten clipboard --get-clipboard

# === Window/Tab Management ===
# Tabs
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+] next_tab
map ctrl+shift+[ previous_tab
map ctrl+shift+. move_tab_forward
map ctrl+shift+, move_tab_backward

# Fuzzy tab switcher (fzf)
map ctrl+shift+o launch --type=overlay --allow-remote-control ~/.config/kitty/tab-switcher.sh

# === 1Password Integration ===
# Insert password from 1Password (requires op CLI and biometrics enabled)
map ctrl+alt+p kitten onepassword_kitten.py

# Windows (splits)
map ctrl+shift+\ launch --location=vsplit --cwd=current
map ctrl+shift+- launch --location=hsplit --cwd=current

# Navigate windows (with ctrl+shift)
map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down

# === vim-kitty-navigator ===
# Seamless ctrl+hjkl navigation between nvim and kitty splits
map ctrl+j kitten pass_keys.py bottom ctrl+j
map ctrl+k kitten pass_keys.py top    ctrl+k
map ctrl+h kitten pass_keys.py left   ctrl+h
map ctrl+l kitten pass_keys.py right  ctrl+l

# Resize windows
map ctrl+shift+r start_resizing_window
# Or use these for direct resizing:
map ctrl+alt+h resize_window narrower 3
map ctrl+alt+l resize_window wider 3
map ctrl+alt+k resize_window taller 3
map ctrl+alt+j resize_window shorter 3

# === Layouts ===
enabled_layouts splits,tall,fat,grid,stack
map ctrl+shift+space next_layout
map ctrl+shift+` toggle_layout stack  # zoom current window (backtick)

# === Marks & Navigation ===
# Scroll to prompts (shell integration)
map ctrl+shift+z scroll_to_prompt -1  # previous prompt
map ctrl+shift+x scroll_to_prompt 1   # next prompt

# Show last command output in pager
map ctrl+shift+g show_last_command_output

# === Broadcast ===
# Type in all windows simultaneously (useful for multi-server work)
map ctrl+shift+b launch --allow-remote-control kitty +kitten broadcast

# === Keyboard Text Selection (kitty_grab) ===
# Enter grab mode with vim-style navigation
map ctrl+shift+f kitten kitty_grab/grab.py

# === Clipboard ===
copy_on_select clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Strip trailing spaces when copying
strip_trailing_spaces smart

# === Cursor ===
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# === Bell ===
enable_audio_bell no
visual_bell_duration 0.1
visual_bell_color #ff5555

# === Performance ===
repaint_delay 10
input_delay 3
sync_to_monitor yes

# === Appearance ===
background_opacity 0.95
dim_opacity 0.75

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_font_style bold

# Window
window_padding_width 4
window_margin_width 0
single_window_margin_width 0
window_border_width 1pt
draw_minimal_borders yes
hide_window_decorations titlebar-only

# === URLs ===
url_style curly
detect_urls yes
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh

# === macOS Specific ===
macos_option_as_alt yes
macos_quit_when_last_window_closed no
macos_window_resizable yes
macos_traditional_fullscreen no
macos_titlebar_color background

# === Remote Control ===
# Enable for scripts/automation and vim-kitty-navigator
allow_remote_control yes
listen_on unix:/tmp/kitty

# === Session Management ===
# Save session (prompts for name)
map ctrl+shift+s>s launch --type=overlay python3 ~/Lab_notebook/terminal/kitty-session-manager/save_session.py

# Quick save to 'default' session
map ctrl+shift+s>d launch --type=overlay python3 ~/Lab_notebook/terminal/kitty-session-manager/save_session.py default

# List and restore sessions
map ctrl+shift+s>r launch --type=overlay python3 ~/Lab_notebook/terminal/kitty-session-manager/restore_session.py --list

# === Misc ===
confirm_os_window_close -1  # confirm if multiple windows open
# disable update checks
update_check_interval 0

# === Theme ===
# You can use: kitty +kitten themes
# Or include a theme file:
# include themes/dracula.conf

# Ocean-inspired dark theme (sensible defaults)
foreground #c0c5ce
background #1b2b34
selection_foreground #1b2b34
selection_background #c0c5ce

# Normal colors
color0  #1b2b34
color1  #ec5f67
color2  #99c794
color3  #fac863
color4  #6699cc
color5  #c594c5
color6  #5fb3b3
color7  #c0c5ce

# Bright colors
color8  #65737e
color9  #ec5f67
color10 #99c794
color11 #fac863
color12 #6699cc
color13 #c594c5
color14 #5fb3b3
color15 #d8dee9
map shift+enter send_text all \e\r
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf
